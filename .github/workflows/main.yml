name: Build and Release WinUI 3

on:
  push:
    tags:
      - 'v*' # Triggers when you push v1.0, v1.1.0, etc.

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Required for GitVersion to see your history

    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v1.1.1
      with:
        versionSpec: '5.x'

    - name: Determine Version
      id: gitversion
      uses: gittools/actions/gitversion/execute@v1.1.1

    - name: Restore Dependencies
      run: dotnet restore

    - name: Publish Unpackaged App
      # We disable PublishSingleFile and PublishTrimmed for WinUI 3 to ensure 
      # all resources.pri and dependency DLLs are correctly loaded at runtime.
      run: >
        dotnet publish ShortcutManager.csproj
        -c Release 
        -r win-x64 
        --self-contained true 
        -p:PublishSingleFile=false
        -p:PublishTrimmed=false
        -p:PublishReadyToRun=true
        -p:EnableMsixTooling=true
        -p:WindowsPackageType=None
        -p:PlatformTarget=x64
        -p:Version=${{ steps.gitversion.outputs.AssemblySemVer }} 
        -p:InformationalVersion=${{ steps.gitversion.outputs.InformationalVersion }}
        -o ./publish

    - name: Zip the Output
      shell: pwsh
      run: |
        # Remove debug symbols and documentation to keep the release clean
        Get-ChildItem -Path ./publish -Include *.pdb, *.xml -Recurse | Remove-Item -Force
        
        # Compress the entire publish directory including subfolders (like icons/)
        Compress-Archive -Path ./publish/* -DestinationPath ./ShortcutManager_v${{ steps.gitversion.outputs.MajorMinorPatch }}_x64.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ steps.gitversion.outputs.FullSemVer }}
        draft: false
        prerelease: false
        files: |
          *.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
